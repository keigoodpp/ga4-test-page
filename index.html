<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page</title>

    <script>
      window.dataLayer = window.dataLayer || [];
    </script>

    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-MHZHP6BF");
    </script>

    <style>
      body {
        font-family: sans-serif;
        line-height: 1.8;
        margin: 0;
        padding: 24px;
      }
      section {
        min-height: 100vh;
        padding: 24px 0;
        border-bottom: 1px solid #ddd;
      }
      button {
        padding: 12px 20px;
        margin: 8px 8px 8px 0;
      }
    </style>
  </head>
  <body>
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-MHZHP6BF"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>

    <section>
      <h1>Test Page</h1>
      <p>スクロール深度テスト用のページです。</p>
      <button id="header-cta">ヘッダーCTA</button>
    </section>

    <section>
      <h2>Section 2</h2>
      <p>このあたりで 25%〜50% くらいを通過しやすい。</p>
      <button id="main-cta">メインCTA</button>
    </section>

    <section>
      <h2>Section 3</h2>
      <p>さらに下まで読んだユーザーの挙動を確認する。</p>
    </section>

    <section>
      <h2>Section 4</h2>
      <p>終盤到達確認用。</p>
      <button id="footer-cta">フッターCTA</button>
    </section>

    <script>
      function pushCtaEvent(name) {
        window.dataLayer.push({
          event: "cta_click",
          button_name: name,
        });
      }

      window.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("header-cta")
          .addEventListener("click", function () {
            pushCtaEvent("header_cta");
          });

        document
          .getElementById("main-cta")
          .addEventListener("click", function () {
            pushCtaEvent("main_cta");
          });

        document
          .getElementById("footer-cta")
          .addEventListener("click", function () {
            pushCtaEvent("footer_cta");
          });
      });
    </script>
  </body>
</html>
